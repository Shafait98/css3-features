<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore CSS Transform</title>
    <style>
        .container
        {
         background-color: aqua;
         width: 250px;
         height: 250px;
         border: 2px solid green;

        }

        .inner
        {
            background-color: bisque;
            width: 250px;
            height: 250px;
            border: 2px solid rebeccapurple;
            transform: scale(0.25, 0.5);
            

        }

    </style>
</head>
<body>

    <div class="container">
        
        <div class="inner"></div>
    </div>
    <div class="container">
        
        <div class="inner"></div>
    </div>
    <div class="container">
    
        <div class="inner"></div>
    </div>
    
</body>
</html>
